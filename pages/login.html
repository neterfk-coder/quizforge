<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — QuizForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-body">
    <div class="auth-wrapper">
      <!-- Logo -->
      <a href="../index.html" class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        </div>
        QuizForge
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Bienvenido de vuelta</h1>
        <p class="auth-sub">Ingresa a tu cuenta para continuar</p>

        <div id="auth-error" class="auth-alert" style="display: none"></div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="tucorreo@ejemplo.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <div class="form-label-row">
            <label class="form-label" for="password">Contraseña</label>
            <a href="recuperacion.html" class="form-link"
              >¿Olvidaste tu contraseña?</a
            >
          </div>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-auth" id="login-btn" onclick="handleLogin()">
          Iniciar sesión
        </button>

        <p class="auth-footer-text">
          ¿No tienes cuenta?
          <a href="register.html" class="form-link">Regístrate gratis</a>
        </p>
      </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script>
      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        const errBox = document.getElementById("auth-error");

        if (!email || !password) {
          showError("Completa todos los campos.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Ingresando...";

        try {
          await window.signIn(email, password);
          window.location.href = "dashboard.html";
        } catch (err) {
          showError("Correo o contraseña incorrectos.");
          btn.disabled = false;
          btn.textContent = "Iniciar sesión";
        }
      }

      function showError(msg) {
        const box = document.getElementById("auth-error");
        box.textContent = msg;
        box.style.display = "block";
      }

      // Login con Enter
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
