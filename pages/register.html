<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — QuizForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-body">
    <div class="auth-wrapper">
      <a href="../index.html" class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        </div>
        QuizForge
      </a>

      <div class="auth-card">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-sub">Free forever. No card required.</p>

        <div id="auth-error" class="auth-alert" style="display: none"></div>
        <div
          id="auth-success"
          class="auth-alert auth-alert-success"
          style="display: none"
        ></div>

        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input
            type="text"
            id="name"
            class="form-input"
            placeholder="Your name"
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="youremail@example.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
          />
          <div class="password-strength" id="pwd-strength"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input
            type="password"
            id="confirm"
            class="form-input"
            placeholder="Repeat your password"
            autocomplete="new-password"
          />
        </div>

        <button class="btn-auth" id="register-btn" onclick="handleRegister()">
          Create account
        </button>

        <p class="auth-footer-text">
          Already have an account?
          <a href="login.html" class="form-link">Sign in</a>
        </p>
      </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script>
      // Password strength indicator
      document
        .getElementById("password")
        .addEventListener("input", function () {
          const val = this.value;
          const bar = document.getElementById("pwd-strength");
          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;
          const labels = ["", "Débil", "Regular", "Buena", "Excelente"];
          const colors = ["", "#dc2626", "#f59e0b", "#0ea5e9", "#16a34a"];
          bar.innerHTML = val
            ? `<span style="color:${colors[score]};font-size:.75rem;font-weight:500">${labels[score]}</span>`
            : "";
        });

      async function handleRegister() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;
        const btn = document.getElementById("register-btn");

        if (!name || !email || !password) {
          showError("Fill in all fields.");
          return;
        }
        if (password.length < 8) {
          showError("Password must be at least 8 characters long.");
          return;
        }
        if (password !== confirm) {
          showError("Passwords do not match.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Creating account...";

        try {
          await window.signUp(email, password, name);
          document.getElementById("auth-error").style.display = "none";
          const ok = document.getElementById("auth-success");
          ok.textContent = "Account created! Check your email to confirm.";
          ok.style.display = "block";
          btn.textContent = "Done!";
        } catch (err) {
          showError("Could not create the account. Try a different email.");
          btn.disabled = false;
          btn.textContent = "Create account";
        }
      }

      function showError(msg) {
        const box = document.getElementById("auth-error");
        box.textContent = msg;
        box.style.display = "block";
      }
    </script>
  </body>
</html>
